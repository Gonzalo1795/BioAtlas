{% extends 'atlas/base.html' %}
{% block title %}¡Bienvenido a Premium! — BioAtlas{% endblock %}
{% block content %}
<div style="text-align:center; padding:8rem 2rem; position:relative;">
    <div style="position:fixed; inset:0; background:radial-gradient(ellipse 50% 60% at 50% 40%, rgba(212,175,55,0.06) 0%, transparent 60%); pointer-events:none;"></div>
    <div style="position:relative; z-index:1;">
        <div style="font-size:5rem; margin-bottom:1.5rem; animation:fadeUp 0.6s ease both;">✨</div>
        <h1 style="font-family:var(--font-display); color:var(--text); font-size:2.2rem; font-weight:700; margin-bottom:0.75rem; letter-spacing:-0.02em; animation:fadeUp 0.6s 0.1s ease both;">¡Bienvenido a BioAtlas Premium!</h1>
        <p style="color:var(--text-muted); font-size:1rem; max-width:480px; margin:0 auto 2.5rem; line-height:1.7; animation:fadeUp 0.6s 0.2s ease both;">Tu suscripción está activa. Ya puedes explorar la biodiversidad del mundo sin ningún límite.</p>
        <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; animation:fadeUp 0.6s 0.3s ease both;">
            <a href="{% url 'atlas:biolog' %}" style="padding:14px 28px; background:var(--green); color:#0A0F0D; border-radius:999px; text-decoration:none; font-weight:700; font-size:0.95rem;">Ir a Mi Atlas →</a>
            <a href="{% url 'atlas:index' %}" style="padding:14px 28px; background:var(--bg-card); border:1px solid var(--border); color:var(--text); border-radius:999px; text-decoration:none; font-weight:600; font-size:0.95rem;">Explorar el atlas</a>
        </div>
    </div>
</div>
<style>@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}</style>
{% endblock %}
